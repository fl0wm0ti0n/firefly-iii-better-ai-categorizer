# =============================================================================
# DEPRECATED for production — do not use for daily operation.
#
# Production runs from the parent stack:
#   cd /workdir/firefly && docker compose up -d categorizer
#   → container "categorizer", port 3000, Traefik: categorizer.omniflow.cc
#
# This file is only for optional local/standalone testing on port 3001.
# Services use profile "standalone-dev" so a plain `docker compose up` starts
# nothing and Docker will not recreate this container after reboot.
#
# To start manually (not recommended):
#   docker compose --profile standalone-dev up -d
# =============================================================================
version: '3.8'

services:
  firefly-ai-categorizer:
    profiles:
      - standalone-dev
    build:
      context: .
      dockerfile: Dockerfile
    container_name: firefly-ai-categorizer-DEPRECATED-do-not-use
    restart: "no"
    ports:
      - "3001:3000"
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./public:/app/public:ro
    environment:
      - NODE_ENV=production
    labels:
      omniflow.deprecated: "true"
      omniflow.note: "Use categorizer on port 3000 from /workdir/firefly/docker-compose.yml"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - firefly-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    user: "1001:1001"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    read_only: false
    security_opt:
      - no-new-privileges:true

networks:
  firefly-network:
    driver: bridge
    name: firefly-ai-network

volumes:
  app-data:
    driver: local
  app-logs:
    driver: local
